name: Deploy to AWS il-central-1

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: 'Run terraform apply (infra changes)'
        type: boolean
        default: false

env:
  AWS_REGION: il-central-1
  APP_DIR: /opt/clearfin
  APP_USER: clearfin

jobs:
  # ---------------------------------------------------------------------------
  # Terraform — apply infra changes when explicitly triggered
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_apply == true
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: iac/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: iac/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: iac/terraform
        run: terraform apply tfplan

  # ---------------------------------------------------------------------------
  # Deploy — build + ship to EC2 via SSM Run Command (no SSH or bastion)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: []  # runs independently of terraform job
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          # Dummy values — postgres.js and pg.Pool connect lazily (not at import time)
          DATABASE_URL: "postgresql://localhost:5432/clearfin"
          NEXTAUTH_SECRET: "build-time-placeholder-not-used"
          NEXTAUTH_URL: "http://localhost:3000"
        run: |
          cd apps/web
          npm run build

      - name: Build worker
        run: |
          cd apps/worker
          npm run build

      - name: Create deployment archive
        run: |
          # public/ is optional — only include if it exists
          PUBLIC_ARG=""
          [ -d "apps/web/public" ] && PUBLIC_ARG="apps/web/public"
          tar -czf deploy.tar.gz \
            --exclude='apps/web/.next/cache' \
            apps/web/.next \
            apps/web/package.json \
            apps/worker/bundle \
            apps/worker/package.json \
            package.json \
            package-lock.json \
            scripts \
            supabase/migrations \
            $PUBLIC_ARG

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload archive to S3
        run: |
          aws s3 cp deploy.tar.gz \
            s3://${{ secrets.DEPLOY_BUCKET }}/clearfin/deploy-${{ github.sha }}.tar.gz

      - name: Deploy via SSM Run Command
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          SHA=${{ github.sha }}
          BUCKET=${{ secrets.DEPLOY_BUCKET }}

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -euo pipefail',
              'APP_DIR=${{ env.APP_DIR }}',
              'APP_USER=${{ env.APP_USER }}',
              'echo \"=== Deploying SHA: $SHA ===\"',
              'aws s3 cp s3://$BUCKET/clearfin/deploy-$SHA.tar.gz /tmp/deploy.tar.gz',
              'mkdir -p \$APP_DIR',
              'rm -rf \$APP_DIR/apps/web/.next',
              'tar -xzf /tmp/deploy.tar.gz -C \$APP_DIR',
              'cd \$APP_DIR/apps/worker && rm -rf node_modules && PUPPETEER_SKIP_DOWNLOAD=true npm install --omit=dev 2>&1 | tail -5',
              'mkdir -p \$APP_DIR/apps/web/.next/standalone/apps/web/.next',
              'cp -r \$APP_DIR/apps/web/.next/static \$APP_DIR/apps/web/.next/standalone/apps/web/.next/static',
              'if [ -d \$APP_DIR/apps/web/public ]; then mkdir -p \$APP_DIR/apps/web/.next/standalone/apps/web/public && cp -r \$APP_DIR/apps/web/public/. \$APP_DIR/apps/web/.next/standalone/apps/web/public/; fi',
              'chown -R \$APP_USER:\$APP_USER \$APP_DIR',
              'cd \$APP_DIR && export DATABASE_URL=\$(grep DATABASE_URL .env | cut -d= -f2-) && npx tsx scripts/migrate.ts 2>&1 | tail -20',
              'sudo -u \$APP_USER pm2 startOrReload \$APP_DIR/ecosystem.config.cjs --update-env',
              'sudo -u \$APP_USER pm2 save',
              'rm -f /tmp/deploy.tar.gz',
              'echo \"=== Deploy complete ===\"'
            ]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Give SSM agent time to pick up the command before polling
          sleep 30

          # Wait for command to finish
          for i in $(seq 1 90); do
            RAW=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "CommandInvocations[0].Status" \
              --output text 2>&1) || true
            STATUS="$RAW"
            echo "[$i/90] Raw: $RAW"
            # Empty, None, error text, or still running — keep waiting
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) ;;
              *) sleep 10; continue ;;
            esac
            echo "[$i/90] Final status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "=== Deployment succeeded ==="
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --details \
                --query "CommandInvocations[0].CommandPlugins[0].Output" \
                --output text
              exit 0
            else
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --details \
                --query "CommandInvocations[0].CommandPlugins[0].Output" \
                --output text
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
          done
          echo "Timed out waiting for SSM command"
          exit 1
