name: Deploy to AWS il-central-1

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      terraform_apply:
        description: 'Run terraform apply (infra changes)'
        type: boolean
        default: false

env:
  AWS_REGION: il-central-1
  APP_DIR: /opt/clearfin
  APP_USER: clearfin

jobs:
  # ---------------------------------------------------------------------------
  # Terraform — apply infra changes when explicitly triggered
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_apply == true
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: iac/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: iac/terraform
        env:
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_credentials_encryption_key: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_upstash_redis_rest_url: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TF_VAR_upstash_redis_rest_token: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TF_VAR_next_public_supabase_url: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          TF_VAR_next_public_supabase_anon_key: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: iac/terraform
        env:
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_anon_key: ${{ secrets.SUPABASE_ANON_KEY }}
          TF_VAR_supabase_service_role_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TF_VAR_credentials_encryption_key: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_upstash_redis_rest_url: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TF_VAR_upstash_redis_rest_token: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TF_VAR_next_public_supabase_url: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          TF_VAR_next_public_supabase_anon_key: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: terraform apply tfplan

  # ---------------------------------------------------------------------------
  # Deploy — build + ship to EC2 via SSM Run Command (no SSH or bastion)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: []  # runs independently of terraform job
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          cd apps/web
          npm run build

      - name: Build worker
        run: |
          cd apps/worker
          npm run build

      - name: Create deployment archive
        run: |
          # public/ is optional — only include if it exists
          PUBLIC_ARG=""
          [ -d "apps/web/public" ] && PUBLIC_ARG="apps/web/public"
          tar -czf deploy.tar.gz \
            --exclude='apps/web/.next/cache' \
            apps/web/.next \
            apps/web/package.json \
            apps/worker/bundle \
            apps/worker/package.json \
            package.json \
            package-lock.json \
            $PUBLIC_ARG

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload archive to S3
        run: |
          aws s3 cp deploy.tar.gz \
            s3://${{ secrets.DEPLOY_BUCKET }}/clearfin/deploy-${{ github.sha }}.tar.gz

      - name: Deploy via SSM Run Command
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          SHA=${{ github.sha }}
          BUCKET=${{ secrets.DEPLOY_BUCKET }}

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'set -euo pipefail',
              'APP_DIR=${{ env.APP_DIR }}',
              'APP_USER=${{ env.APP_USER }}',
              'echo \"=== Deploying SHA: $SHA ===\"',
              'aws s3 cp s3://$BUCKET/clearfin/deploy-$SHA.tar.gz /tmp/deploy.tar.gz',
              'mkdir -p \$APP_DIR',
              'rm -rf \$APP_DIR/apps/web/.next',
              'tar -xzf /tmp/deploy.tar.gz -C \$APP_DIR',
              'cd \$APP_DIR/apps/worker && rm -rf node_modules && PUPPETEER_SKIP_DOWNLOAD=true npm install --omit=dev 2>&1 | tail -5',
              'mkdir -p \$APP_DIR/apps/web/.next/standalone/apps/web/.next',
              'cp -r \$APP_DIR/apps/web/.next/static \$APP_DIR/apps/web/.next/standalone/apps/web/.next/static',
              'if [ -d \$APP_DIR/apps/web/public ]; then mkdir -p \$APP_DIR/apps/web/.next/standalone/apps/web/public && cp -r \$APP_DIR/apps/web/public/. \$APP_DIR/apps/web/.next/standalone/apps/web/public/; fi',
              'chown -R \$APP_USER:\$APP_USER \$APP_DIR',
              'sudo -u \$APP_USER pm2 startOrReload \$APP_DIR/ecosystem.config.cjs --update-env',
              'sudo -u \$APP_USER pm2 save',
              'rm -f /tmp/deploy.tar.gz',
              'echo \"=== Deploy complete ===\"'
            ]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to finish
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1
